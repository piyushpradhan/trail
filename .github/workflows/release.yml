name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            assets: |
              dist/Trail-Setup-*.exe::trail-windows-x64-setup.exe
              dist/latest.yml::latest.yml
          - os: macos-latest
            assets: |
              dist/Trail-*-arm64.dmg::trail-macos-arm64.dmg
              dist/Trail-*-x64.dmg::trail-macos-x64.dmg
              dist/latest-mac.yml::latest-mac.yml
          - os: ubuntu-latest
            assets: |
              dist/Trail-*.AppImage::trail-linux-x86_64.AppImage
              dist/latest-linux.yml::latest-linux.yml

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package
        run: npm run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Stage artifacts
        id: stage
        shell: bash
        run: |
          shopt -s nullglob
          mkdir -p staging
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            src_pat="${line%%::*}"
            dst_name="${line##*::}"
            files=( $src_pat )
            if [ ${#files[@]} -eq 0 ]; then
              echo "::warning::No file matched $src_pat (skipping — file may be optional)"
              continue
            fi
            src="${files[0]}"
            cp "$src" "staging/$dst_name"
            echo "  staged: $src -> staging/$dst_name"
          done <<< "${{ matrix.assets }}"
          echo "--- staged files ---"
          ls -la staging/

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: staging/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag exists — uploading assets (clobber)"
            gh release upload "$tag" artifacts/* --clobber
          else
            echo "Creating release $tag"
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              artifacts/*
          fi
